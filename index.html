<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b1329;
            color: #f8fafc;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #121e3d;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #f59e0b;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        p {
            color: #94a3b8;
            line-height: 1.6;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>صدقة جارية</h1>
        <p>اللهم اغفر لموتانا وموتى المسلمين، واجعل هذا العمل صدقة جارية ترحم بها أمواتنا يا رب العالمين.</p>
    </div>

</body>
</html>
